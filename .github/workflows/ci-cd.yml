name: CI - Pipeline Qualité Eau

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install great_expectations pandas requests pytest pytest-cov flake8

      - name: Lint code
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests on sample data
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml --ignore=notebooks/
        env:
          SAMPLE_DATA_PATH: data/sample/sample_eau.csv

      - name: Lightweight Great Expectations validation
        run: |
          python -c "
          import pandas as pd
          import great_expectations as gx
          df = pd.read_csv('${{ env.SAMPLE_DATA_PATH }}', sep=';')
          context = gx.get_context()
          suite = context.suites.add(gx.ExpectationSuite(name='sample_suite'))
          suite.add_expectation(gx.expectations.ExpectColumnValuesToNotBeNull(column='id_prelevement'))
          suite.add_expectation(gx.expectations.ExpectColumnValuesToBeOfType(column='resultat', type_='float64'))
          validator = context.sources.pandas_default.read_dataframe(df)
          result = context.run_validation_definition(
              gx.ValidationDefinition(name='sample_val', data=validator, suite=suite)
          )
          print(f'GE Validation: {\"PASS\" if result.success else \"FAIL\"}')
          assert result.success, 'Great Expectations failed on sample data'
          "

      - name: Check Databricks readiness
        run: |
          echo "✅ Structure vérifiée pour Databricks"
          find notebooks/ -name "*.py" -type f | wc -l
          test -f requirements.txt || exit 1

      - name: Upload coverage & test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-results
          path: |
            coverage.xml
            .coverage
          retention-days: 3